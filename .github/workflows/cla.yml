name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        # contributor-assistant/github-action v2.6.1
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A classic PAT (repo scope) or fine-grained PAT with Contents +
          # Pull requests read/write. Required so signature commits and PR
          # checks work reliably. Add it under repo Settings → Secrets.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/Doka-NT/Taviraq/blob/main/CLA.md
          # Keep bot-maintained CLA signatures out of the protected main branch.
          branch: cla-signatures
          custom-notsigned-prcomment: 'Thank you for your contribution! Before we can merge it, please sign our [Contributor License Agreement](https://github.com/Doka-NT/Taviraq/blob/main/CLA.md). It only takes one comment and you only do it once.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
          # Maintainers and bots never need to sign.
          allowlist: Doka-NT,*[bot]
