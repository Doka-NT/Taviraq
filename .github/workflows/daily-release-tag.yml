name: Daily release tag

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-release-tag
  cancel-in-progress: false

jobs:
  tag:
    name: Create release tag when main changed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create next release tag
        run: |
          set -euo pipefail

          git fetch --force --tags origin

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            next_tag="v0.0.1"
          elif git diff --quiet "${latest_tag}..HEAD"; then
            echo "No changes since ${latest_tag}; skipping tag creation."
            exit 0
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<EOF
          $version
          EOF
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          if git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null; then
            echo "Tag ${next_tag} already exists; skipping tag creation."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$next_tag" -m "Release ${next_tag}"
          git push origin "$next_tag"
