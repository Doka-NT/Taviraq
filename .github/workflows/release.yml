name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos:
    name: macOS developer preview build
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Set package version from tag
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Generate changelog from tags
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: node scripts/generate-changelog.mjs --tag "$TAG_NAME" --release-notes release-notes.md --changelog CHANGELOG.md

      - name: Package macOS app
        run: npm run build && COPYFILE_DISABLE=1 npm exec -- electron-builder --mac zip --publish never

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.zip > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          cat >> release-notes.md <<'EOF'
          ## Verification

          Download `checksums.txt` and verify the archive before opening it:

          ```bash
          shasum -a 256 -c checksums.txt
          ```

          ## Русский

          Это неподписанная тестовая сборка для macOS. Если macOS пишет, что приложение повреждено:

          1. Распакуйте ZIP.
          2. Переместите `Taviraq.app` в `/Applications`.
          3. Выполните команду:

          ```bash
          sudo xattr -rd com.apple.quarantine "/Applications/Taviraq.app"
          ```

          После этого откройте приложение снова.

          ## English

          This is an unsigned test build for macOS. If macOS says the app is damaged:

          1. Unzip the archive.
          2. Move `Taviraq.app` to `/Applications`.
          3. Run:

          ```bash
          sudo xattr -rd com.apple.quarantine "/Applications/Taviraq.app"
          ```

          Then open the app again.

          ## 中文

          这是一个未签名的 macOS 测试版本。如果 macOS 提示应用已损坏：

          1. 解压 ZIP 文件。
          2. 将 `Taviraq.app` 移动到 `/Applications`。
          3. 运行：

          ```bash
          sudo xattr -rd com.apple.quarantine "/Applications/Taviraq.app"
          ```

          然后再次打开应用。
          EOF

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.zip dist/checksums.txt CHANGELOG.md --clobber
            gh release edit "$TAG_NAME" --draft=false --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" dist/*.zip dist/checksums.txt CHANGELOG.md \
              --title "$TAG_NAME" \
              --notes-file release-notes.md
          fi
