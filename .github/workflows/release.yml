name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  macos:
    name: macOS signed release build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Set package version from tag
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Generate changelog from tags
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: node scripts/generate-changelog.mjs --tag "$TAG_NAME" --release-notes release-notes.md --changelog CHANGELOG.md

      - name: Package macOS app (signed + notarized)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Aptabase Cloud key, baked into the bundle at build time. Empty unless
          # configured, which keeps opt-in telemetry a no-op until a key exists.
          TAVIRAQ_APTABASE_KEY: ${{ vars.APTABASE_APP_KEY }}
        run: npm run build && COPYFILE_DISABLE=1 npm exec -- electron-builder --mac zip --publish never -c.mac.notarize=true

      - name: Verify signature and notarization
        run: |
          APP=$(find dist -maxdepth 3 -name '*.app' | head -1)
          if [ -z "$APP" ]; then echo "No .app found in dist/"; exit 1; fi
          echo "Verifying: $APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl --assess --type execute --verbose=4 "$APP"
          xcrun stapler validate "$APP"

      - name: Verify auto-update feed
        run: |
          if [ ! -f dist/latest-mac.yml ]; then
            echo "latest-mac.yml missing from dist/ — auto-update feed would be incomplete"
            exit 1
          fi

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.zip > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          cat >> release-notes.md <<'EOF'
          This is a signed and notarized macOS build. Unzip it and move
          `Taviraq.app` to `/Applications` — no quarantine workaround is needed.

          ## Verification

          Download `checksums.txt` and verify the archive before opening it:

          ```bash
          shasum -a 256 -c checksums.txt
          ```

          To confirm the app is signed and notarized:

          ```bash
          spctl --assess --type execute --verbose=4 "/Applications/Taviraq.app"
          xcrun stapler validate "/Applications/Taviraq.app"
          ```

          ## Русский

          Это подписанная и нотаризованная сборка для macOS. Распакуйте ZIP и
          переместите `Taviraq.app` в `/Applications` — обходить quarantine не нужно.

          ## 中文

          这是经过签名和公证的 macOS 版本。解压 ZIP 并将 `Taviraq.app`
          移动到 `/Applications` 即可，无需绕过 quarantine。
          EOF

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.zip dist/latest-mac.yml dist/checksums.txt CHANGELOG.md --clobber
            gh release edit "$TAG_NAME" --draft=false --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" dist/*.zip dist/latest-mac.yml dist/checksums.txt CHANGELOG.md \
              --title "$TAG_NAME" \
              --notes-file release-notes.md
          fi
